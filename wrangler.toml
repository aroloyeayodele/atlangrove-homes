name = "atlangrove"
main = "worker/src/index.ts"
compatibility_date = "2024-03-18"

[vars]
ENV = "production"

[site]
bucket = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "atlangrove_db"
database_id = "842a15f7-669c-4f13-8835-7880b9d9c572"
migrations_dir = "worker/migrations"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "atlangrove-media"

[[kv_namespaces]]
binding = "__STATIC_CONTENT"
id = "662a2a1be4894aaa8bc3ec1f9d1d50cf"
